<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmartQR - Attendance System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
</head>

<body class="bg-[#f0f2f5] text-gray-900 font-inter">
  <div id="root">
    <div
      style="height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: sans-serif; gap: 20px;">
      <div
        style="width: 40px; height: 40px; border: 4px solid #3B82F6; border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite;">
      </div>
      <h2 style="color: #1e293b; margin: 0;">SmartQR Initializing...</h2>
      <p style="color: #64748b; margin: 0; font-size: 14px;">If this takes too long, please check your console (F12).
      </p>
    </div>
  </div>
  <style>
    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
