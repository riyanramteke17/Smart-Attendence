<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>😊</text></svg>">
  <!-- Mobile viewport with safe area support for iPhone notch -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <!-- PWA & Mobile Meta Tags -->
  <meta name="theme-color" content="#3B82F6" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="SmartQR" />
  <!-- SEO -->
  <meta name="description" content="SmartQR - Automatic QR-based attendance system for students and teachers." />
  <title>SmartQR - Attendance System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
</head>

<body class="bg-[#f0f2f5] text-gray-900 font-inter">
  <div id="root">
    <div
      style="height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: sans-serif; gap: 20px;">
      <div
        style="width: 40px; height: 40px; border: 4px solid #3B82F6; border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite;">
      </div>
      <h2 style="color: #1e293b; margin: 0;">SmartQR Initializing...</h2>
      <p style="color: #64748b; margin: 0; font-size: 14px;">If this takes too long, please check your console (F12).
      </p>
    </div>
  </div>
  <style>
    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
